<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Simple Auth</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    
    <div class="glass-card">
        <div class="text-center">
            <h2>Welcome Back</h2>
            <p class="subtitle" id="loginSubtitle">Enter your credentials to access your account</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email" id="emailLabel">Email or Mobile Number</label>
                <input type="text" id="email" required autocomplete="username" placeholder="name@example.com or 9876543210">
            </div>

            <div class="form-group password-group">
                <div class="form-label-row">
                    <label for="password" id="passwordLabel">Password</label>
                    <a href="#" class="forgot-password-link" id="forgotPasswordLink">Forgot Password?</a>
                </div>
                <div class="password-wrapper">
                    <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
                    <button type="button" id="togglePassword" class="password-toggle-btn" aria-label="Toggle Password Visibility">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="form-group" id="otpGroup" style="display: none;">
                <div class="form-label-row">
                    <label for="otp" id="otpLabel">OTP</label>
                    <span id="countdownTimer" style="font-size: 13px; color: var(--text-secondary); font-weight: 500;"></span>
                </div>
                <input type="text" id="otp" placeholder="Enter 6-digit OTP" maxlength="6" autocomplete="one-time-code">
                <div style="margin-top: 8px; text-align: right;">
                    <a href="#" id="resendOtpLink" class="forgot-password-link" style="font-size: 12px; pointer-events: none; opacity: 0.5;">Resend OTP</a>
                </div>
            </div>

            <div class="form-options" id="rememberMeOptions">
                <label class="checkbox-container">
                    <input type="checkbox" id="rememberMe">
                    <span class="checkbox-checkmark"></span>
                    <span class="checkbox-label">Remember me for 30 days</span>
                </label>
            </div>

            <div id="errorMessage" class="error-message"></div>

            <button type="submit" class="btn" id="submitBtn">
                <span class="btn-text" id="submitBtnText">Sign In</span>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="btn-icon-right" id="submitBtnIcon">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                    <polyline points="10 17 15 12 10 7"></polyline>
                    <line x1="15" y1="12" x2="3" y2="12"></line>
                </svg>
                <span class="loader"></span>
            </button>

            <div class="otp-toggle-container">
                <a href="#" id="toggleOtpLogin" class="otp-toggle-link">Login with OTP instead</a>
            </div>
        </form>
    </div>

    <script src="./assets/js/auth.js"></script>
</body>
</html>
