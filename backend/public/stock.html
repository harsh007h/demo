<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Management - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
    <style>
        /* Specific Styles for Stock Page warnings */
        .low-stock-warning-banner {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 16px;
            padding: 16px 24px;
            color: #fca5a5;
            font-size: 14px;
            display: none;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 24px;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .low-stock-warning-banner.show {
            display: flex;
        }

        .warning-badge {
            background: var(--error-color);
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 6px;
            text-transform: uppercase;
        }

        .status-badge.status-low {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .status-badge.status-ok {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
    </style>
</head>

<body class="dashboard-page">
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2" style="background: #10b981;"></div>

    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar glass-card">
            <div class="sidebar-header">
                <h2>Admin</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard" data-tooltip="Dashboard">
                    <svg class="sidebar-link-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                    <span class="sidebar-label">Dashboard</span>
                </a>
                <a href="party" data-tooltip="Parties">
                    <svg class="sidebar-link-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    <span class="sidebar-label">Parties</span>
                </a>
                <a href="order" data-tooltip="Orders">
                    <svg class="sidebar-link-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span class="sidebar-label">Orders</span>
                </a>
                <a href="stock" class="active" data-tooltip="Stock Management">
                    <svg class="sidebar-link-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path
                            d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z">
                        </path>
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                        <line x1="12" y1="22.08" x2="12" y2="12"></line>
                    </svg>
                    <span class="sidebar-label">Stock Management</span>
                </a>
                <a href="user" data-tooltip="Users">
                    <svg class="sidebar-link-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <span class="sidebar-label">Users</span>
                </a>
                <a href="transport" data-tooltip="Transports">
                    <svg class="sidebar-link-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <rect x="1" y="3" width="15" height="13"></rect>
                        <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon>
                        <circle cx="5.5" cy="18.5" r="2.5"></circle>
                        <circle cx="18.5" cy="18.5" r="2.5"></circle>
                    </svg>
                    <span class="sidebar-label">Transports</span>
                </a>
                <a href="alerts" id="sidebarAlertNameLink" data-tooltip="Alert">
                    <svg class="sidebar-link-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                    <span class="sidebar-label">Alert</span>
                </a>
            </nav>
            <div style="margin-top: auto;">
                <button class="btn btn-logout" id="logoutBtn" data-tooltip="Log Out">
                    <svg class="sidebar-link-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    <span class="sidebar-label">Log Out</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Navbar -->
            <header class="top-navbar glass-card">
                <div class="navbar-title" style="font-size: 18px; font-weight: 600;">Stock Management</div>
                <div class="navbar-user">
                    <button class="btn" id="addStockBtn" style="width: auto; margin-top: 0; padding: 10px 20px;">
                        <span class="btn-text">+ Add Stock</span>
                    </button>
                </div>
            </header>

            <!-- Low Stock Warnings Banner -->
            <div id="lowStockBanner" class="low-stock-warning-banner">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <span class="warning-badge">Alert</span>
                    <span id="lowStockBannerText">Warning: One or more sizes are running low on stock!</span>
                </div>
                <button id="dismissBanner"
                    style="background: none; border: none; color: #fca5a5; font-size: 20px; cursor: pointer; font-weight: bold;">&times;</button>
            </div>

            <!-- Search and Filter -->
            <div class="glass-card"
                style="max-width: none; padding: 20px; display: flex; gap: 16px; margin-bottom: 24px;">
                <input type="text" id="searchStockInput" placeholder="Search by Product Size (e.g. M, L, XL)..."
                    style="flex: 1;">
                <button class="btn" id="searchStockBtn" style="width: auto; margin-top: 0; padding: 0 24px;">
                    <span class="btn-text">Search</span>
                    <span class="loader"></span>
                </button>
            </div>

            <!-- Table -->
            <div class="glass-card table-container" style="max-width: none; overflow-x: auto; padding: 0;">
                <table class="custom-table">
                    <thead>
                        <tr>
                            <th>Product Name</th>
                            <th>Product Size</th>
                            <th>Quantity</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="stockTableBody">
                        <!-- Data populated by JS -->
                    </tbody>
                </table>
                <div id="paginationContainer" class="pagination-container">
                    <!-- Pagination populated by JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modal for Add/Edit -->
    <div id="stockModal" class="modal-overlay">
        <div class="glass-card modal-content" style="max-width: 500px; width: 100%; margin: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h3 id="modalTitle" style="color: white; font-size: 20px;">Add New Stock</h3>
                <button id="closeModal"
                    style="background: none; border: none; color: white; font-size: 24px; cursor: pointer;">&times;</button>
            </div>

            <form id="stockForm">
                <input type="hidden" id="stockId">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="productName" required
                        placeholder="Enter product name (e.g. Shirt A, Jeans B)">
                </div>
                <div class="form-group">
                    <label>Product Size</label>
                    <input type="text" id="productSize" required placeholder="Enter size (e.g. M, L, XL, XXL, 32, 34)">
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" id="quantity" required min="0" placeholder="Enter stock quantity">
                </div>

                <button type="submit" class="btn" id="saveStockBtn">
                    <span class="btn-text">Save Stock</span>
                    <span class="loader"></span>
                </button>
            </form>
        </div>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="./assets/js/notifications.js"></script>
    <script src="./assets/js/stock.js"></script>
    <script src="./assets/js/logout.js"></script>
</body>

</html>
