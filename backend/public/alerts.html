<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerts Center - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
    <style>
        .main-content {
            overflow-y: hidden;
        }

        .notifications-feed-container {
            gap: 12px;
            margin-top: 12px;
        }

        .notification-feed-card {
            padding: 12px 16px;
        }

        .notification-feed-title {
            margin: 0 0 4px 0;
        }

        .pagination-container {
            margin-top: 12px;
            padding: 12px 24px;
        }
    </style>
</head>

<body class="dashboard-page">
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2" style="background: #10b981;"></div>

    <div class="dashboard-layout" id="dashboardContent" style="display: none;">
        <!-- Sidebar -->
        <aside class="sidebar glass-card">
            <div class="sidebar-header">
                <h2>Admin</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" data-tooltip="Dashboard">
                    <svg class="sidebar-link-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                    <span class="sidebar-label">Dashboard</span>
                </a>
                <a href="party.html" data-tooltip="Parties">
                    <svg class="sidebar-link-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    <span class="sidebar-label">Parties</span>
                </a>
                <a href="order.html" data-tooltip="Orders">
                    <svg class="sidebar-link-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span class="sidebar-label">Orders</span>
                </a>
                <a href="stock.html" data-tooltip="Stock Management">
                    <svg class="sidebar-link-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path
                            d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z">
                        </path>
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                        <line x1="12" y1="22.08" x2="12" y2="12"></line>
                    </svg>
                    <span class="sidebar-label">Stock Management</span>
                </a>
                <a href="user.html" data-tooltip="Users">
                    <svg class="sidebar-link-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <span class="sidebar-label">Users</span>
                </a>
                <a href="transport.html" data-tooltip="Transports">
                    <svg class="sidebar-link-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <rect x="1" y="3" width="15" height="13"></rect>
                        <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon>
                        <circle cx="5.5" cy="18.5" r="2.5"></circle>
                        <circle cx="18.5" cy="18.5" r="2.5"></circle>
                    </svg>
                    <span class="sidebar-label">Transports</span>
                </a>
                <a href="alerts.html" class="active" id="sidebarAlertNameLink" data-tooltip="Alert">
                    <svg class="sidebar-link-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                    <span class="sidebar-label">Alert</span>
                </a>
            </nav>
            <div style="margin-top: auto;">
                <button class="btn btn-logout" id="logoutBtn" data-tooltip="Log Out">
                    <svg class="sidebar-link-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    <span class="sidebar-label">Log Out</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Navbar -->
            <header class="top-navbar glass-card">
                <div class="navbar-title" id="alertsTitle" style="font-size: 18px; font-weight: 600;">Alerts Center
                </div>
                <div class="navbar-user">
                    <div class="user-info-mini">
                        <div style="display: flex; flex-direction: column; text-align: right;">
                            <span id="userName" style="font-weight: 500;">Loading...</span>
                            <span id="userEmail" style="font-size: 11px; color: var(--text-secondary);"></span>
                        </div>
                        <div class="profile-avatar-mini" id="avatarInitial"></div>
                    </div>
                </div>
            </header>

            <!-- Screen Reader Live Announcer -->
            <div id="liveAnnouncer" class="sr-only" aria-live="polite"></div>

            <!-- Dashboard Grid for Notifications -->
            <div class="glass-card" style="max-width: none; padding: 20px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                    <h3 id="feedHeaderTitle"
                        style="margin: 0; font-size: 16px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary);">
                        All Notifications</h3>
                </div>

                <div id="notificationsFeed" class="notifications-feed-container" role="feed" aria-busy="false"
                    aria-label="Notification Feed">
                    <div style="text-align: center; padding: 24px; color: var(--text-secondary);">Loading
                        notifications...</div>
                </div>

                <div id="paginationContainer" class="pagination-container"></div>
            </div>
        </main>
    </div>

    <!-- Modal for View Profile -->
    <div id="profileModal" class="modal-overlay">
        <div class="glass-card modal-content" style="max-width: 450px; width: 100%; margin: 20px; padding: 30px;">
            <div
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 16px;">
                <h3 style="color: white; font-size: 20px; font-weight: 600;">My Profile</h3>
                <button id="closeProfileModal"
                    style="background: none; border: none; color: white; font-size: 28px; cursor: pointer; line-height: 1;">&times;</button>
            </div>

            <div class="profile-avatar" id="profileModalAvatar"
                style="width: 90px; height: 90px; font-size: 36px; margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: linear-gradient(135deg, var(--primary-color), #ec4899); color: white; font-weight: 700;">
                U</div>

            <div class="user-info"
                style="margin: 0 0 24px 0; background: rgba(0, 0, 0, 0.2); padding: 20px; border-radius: 16px; border: 1px solid var(--glass-border);">
                <div style="margin-bottom: 16px;">
                    <div class="label"
                        style="font-size: 11px; text-transform: uppercase; color: var(--text-secondary);">Full Name
                    </div>
                    <div class="value" id="profileModalName"
                        style="font-size: 16px; font-weight: 500; margin-top: 4px; color: white;">...</div>
                </div>
                <div style="margin-bottom: 16px;">
                    <div class="label"
                        style="font-size: 11px; text-transform: uppercase; color: var(--text-secondary);">Email Address
                    </div>
                    <div class="value" id="profileModalEmail"
                        style="font-size: 16px; font-weight: 500; margin-top: 4px; color: white;">...</div>
                </div>
                <div style="margin-bottom: 16px;">
                    <div class="label"
                        style="font-size: 11px; text-transform: uppercase; color: var(--text-secondary);">Mobile Number
                    </div>
                    <div class="value" id="profileModalMobile"
                        style="font-size: 16px; font-weight: 500; margin-top: 4px; color: white;">...</div>
                </div>
                <div style="display: flex; gap: 16px;">
                    <div style="flex: 1;">
                        <div class="label"
                            style="font-size: 11px; text-transform: uppercase; color: var(--text-secondary);">Role</div>
                        <div class="value" id="profileModalRole" style="margin-top: 6px;">...</div>
                    </div>
                    <div style="flex: 1;">
                        <div class="label"
                            style="font-size: 11px; text-transform: uppercase; color: var(--text-secondary);">Status
                        </div>
                        <div class="value" id="profileModalStatus" style="margin-top: 6px;">...</div>
                    </div>
                </div>
            </div>

            <button class="btn btn-logout" id="profileModalLogoutBtn" style="margin-top: 10px; width: 100%;">Log
                Out</button>
        </div>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="./assets/js/notifications.js"></script>
    <script src="./assets/js/alerts.js"></script>
</body>

</html>
