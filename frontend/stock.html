<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Management - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
    <style>
        /* Specific Styles for Stock Page warnings */
        .low-stock-warning-banner {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 16px;
            padding: 16px 24px;
            color: #fca5a5;
            font-size: 14px;
            display: none;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 24px;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .low-stock-warning-banner.show {
            display: flex;
        }
        .warning-badge {
            background: var(--error-color);
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 6px;
            text-transform: uppercase;
        }
        .status-badge.status-low {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .status-badge.status-ok {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
    </style>
</head>
<body class="dashboard-page">
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2" style="background: #10b981;"></div>
    
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar glass-card">
            <div class="sidebar-header">
                <h2>Admin</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html">Dashboard</a>
                <a href="party.html">Parties</a>
                <a href="order.html">Orders</a>
                <a href="stock.html" class="active">Stock Management</a>
                <a href="user.html">Users</a>
                <a href="transport.html">Transports</a>
            </nav>
             <div style="margin-top: auto;">
                <button class="btn btn-logout" id="logoutBtn">Log Out</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Navbar -->
            <header class="top-navbar glass-card">
                <div class="navbar-title" style="font-size: 18px; font-weight: 600;">Stock Management</div>
                <div class="navbar-user">
                    <button class="btn" id="addStockBtn" style="width: auto; margin-top: 0; padding: 10px 20px;">
                        <span class="btn-text">+ Add Stock</span>
                    </button>
                </div>
            </header>

            <!-- Low Stock Warnings Banner -->
            <div id="lowStockBanner" class="low-stock-warning-banner">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <span class="warning-badge">Alert</span>
                    <span id="lowStockBannerText">Warning: One or more sizes are running low on stock!</span>
                </div>
                <button id="dismissBanner" style="background: none; border: none; color: #fca5a5; font-size: 20px; cursor: pointer; font-weight: bold;">&times;</button>
            </div>

            <!-- Search and Filter -->
            <div class="glass-card" style="max-width: none; padding: 20px; display: flex; gap: 16px; margin-bottom: 24px;">
                <input type="text" id="searchStockInput" placeholder="Search by Product Size (e.g. M, L, XL)..." style="flex: 1;">
                <button class="btn" id="searchStockBtn" style="width: auto; margin-top: 0; padding: 0 24px;">
                    <span class="btn-text">Search</span>
                    <span class="loader"></span>
                </button>
            </div>

            <!-- Table -->
            <div class="glass-card table-container" style="max-width: none; overflow-x: auto; padding: 0;">
                <table class="custom-table">
                    <thead>
                        <tr>
                            <th>Product Name</th>
                            <th>Product Size</th>
                            <th>Quantity</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="stockTableBody">
                        <!-- Data populated by JS -->
                    </tbody>
                </table>
                <div id="paginationContainer" class="pagination-container">
                    <!-- Pagination populated by JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modal for Add/Edit -->
    <div id="stockModal" class="modal-overlay">
        <div class="glass-card modal-content" style="max-width: 500px; width: 100%; margin: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h3 id="modalTitle" style="color: white; font-size: 20px;">Add New Stock</h3>
                <button id="closeModal" style="background: none; border: none; color: white; font-size: 24px; cursor: pointer;">&times;</button>
            </div>
            
            <form id="stockForm">
                <input type="hidden" id="stockId">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="productName" required placeholder="Enter product name (e.g. Shirt A, Jeans B)">
                </div>
                <div class="form-group">
                    <label>Product Size</label>
                    <input type="text" id="productSize" required placeholder="Enter size (e.g. M, L, XL, XXL, 32, 34)">
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" id="quantity" required min="0" placeholder="Enter stock quantity">
                </div>

                <button type="submit" class="btn" id="saveStockBtn">
                    <span class="btn-text">Save Stock</span>
                    <span class="loader"></span>
                </button>
            </form>
        </div>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="./assets/js/stock.js"></script>
</body>
</html>
