<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Order - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body class="dashboard-page">
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2" style="background: #10b981;"></div>
    
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar glass-card">
            <div class="sidebar-header">
                <h2>Admin</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html">Dashboard</a>
                <a href="party.html">Parties</a>
                <a href="order.html" class="active">Orders</a>
                <!-- <a href="#">Products</a>
                <a href="#">Customers</a> -->
            </nav>
             <div style="margin-top: auto;">
            <button class="btn btn-logout" id="logoutBtn">
                        Log Out
                    </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Navbar -->
            <header class="top-navbar glass-card">
                <div class="navbar-title" style="font-size: 18px; font-weight: 600;">Order Management</div>
                <div class="navbar-user">
                    <button class="btn" id="addOrderBtn" style="width: auto; margin-top: 0; padding: 10px 20px;">
                        <span class="btn-text">+ Add Order</span>
                    </button>
                </div>
            </header>

            <!-- Search and Filter -->
            <div class="glass-card" style="max-width: none; padding: 20px; display: flex; gap: 16px; margin-bottom: 24px; align-items: center;">
                <input type="text" id="searchOrderInput" placeholder="Search Order by Party, Transport, Mobile or Notes..." style="flex: 1;">
                
                <select id="statusFilter" style="width: 200px; margin-bottom: 0;">
                    <option value="">All Statuses</option>
                    <option value="Pending">Pending</option>
                    <option value="In Review">In Review</option>
                    <option value="Bill Sent">Bill Sent</option>
                    <option value="Completed">Completed</option>
                </select>

                <button class="btn" id="searchOrderBtn" style="width: auto; margin-top: 0; padding: 0 24px; height: 50px;">
                    <span class="btn-text">Search</span>
                    <span class="loader"></span>
                </button>
                
                <button class="btn" id="resetFilterBtn" style="width: auto; margin-top: 0; padding: 0 16px; height: 50px; background: rgba(255, 255, 255, 0.1); border: 1px solid var(--glass-border);" title="Reset Filter">
                    <span class="btn-text">⟳</span>
                </button>
            </div>

            <!-- Table -->
            <div class="glass-card table-container" style="max-width: none; overflow-x: auto; padding: 0;">
                <table class="custom-table">
                    <thead>
                        <tr>
                            <th>Party Details</th>
                            <th>Order Date</th>
                            <th>Transport Details</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="orderTableBody">
                        <!-- Data populated by JS -->
                    </tbody>
                </table>
                <div id="paginationContainer" class="pagination-container">
                    <!-- Pagination populated by JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modal for Add/Edit -->
    <div id="orderModal" class="modal-overlay">
        <div class="glass-card modal-content" style="max-width: 900px; width: 100%; margin: 20px; padding: 30px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 16px;">
                <h3 id="modalTitle" style="color: white; font-size: 20px; font-weight: 600;">Create New Order</h3>
                <button id="closeModal" style="background: none; border: none; color: white; font-size: 28px; cursor: pointer; line-height: 1;">&times;</button>
            </div>
            
            <form id="orderForm">
                <input type="hidden" id="orderId">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-bottom: 30px;">
                    <!-- Left Column: Customer Details -->
                    <div>
                        <h3 style="margin-bottom: 24px; font-size: 18px; font-weight: 600; color: white;">Customer Details</h3>
                        
                        <div class="form-group">
                            <label>Order Date</label>
                            <input type="date" id="orderDate" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Party Name</label>
                            <div style="display: flex; gap: 12px;">
                                <select id="partyName" required style="flex: 1;">
                                    <option value="" disabled selected>Select Party</option>
                                    <!-- Options will be populated dynamically -->
                                </select>
                                <button type="button" id="addPartyRedirectBtn" class="btn" style="width: auto; padding: 0 20px; background: #6366f1; border: none; font-weight: 600;">+ Add</button>
                            </div>
                        </div>
                        
                        <div class="row" style="display: flex; gap: 16px; margin-bottom: 20px;">
                            <div class="col form-group" style="flex: 1; margin-bottom: 0;">
                                <label>State</label>
                                <input type="text" id="state" required placeholder="State">
                            </div>
                            <div class="col form-group" style="flex: 1; margin-bottom: 0;">
                                <label>City</label>
                                <input type="text" id="city" required placeholder="City">
                            </div>
                        </div>
                        <div class="row" style="display: flex; gap: 16px;">
                            <div class="col form-group" style="flex: 1; margin-bottom: 0;">
                                <label>Pincode</label>
                                <input type="text" id="pincode" required placeholder="Pincode">
                            </div>
                            <div class="col form-group" style="flex: 1; margin-bottom: 0;">
                                <label>Address</label>
                                <input type="text" id="address" required placeholder="Full Address">
                            </div>
                        </div>
                    </div>

                    <!-- Right Column: Transport & Payment -->
                    <div>
                        <h3 style="margin-bottom: 24px; font-size: 18px; font-weight: 600; color: white;">Transport & Payment</h3>
                        
                        <div class="form-group">
                            <label>Transport Name</label>
                            <input type="text" id="transportName" required placeholder="Enter Transport Agency Name">
                        </div>
                        
                        <div class="form-group">
                            <label>Transport Number</label>
                            <input type="text" id="transportNumber" placeholder="Vehicle / Transport Number">
                        </div>
                        
                        <div class="form-group">
                            <label>Mobile Number</label>
                            <input type="text" id="mobile" required placeholder="Mobile Number">
                        </div>
                        
                        <div class="form-group">
                            <label>Payment Method</label>
                            <select id="paymentMethod" required>
                                <option value="Cash" selected>Cash</option>
                                <option value="UPI">UPI</option>
                                <option value="Bank Transfer">Bank Transfer</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Status</label>
                            <select id="status" required>
                                <option value="Pending" selected>Pending</option>
                                <option value="In Review">In Review</option>
                                <option value="Bill Sent">Bill Sent</option>
                                <option value="Completed">Completed</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div style="height: 1px; background: rgba(255,255,255,0.1); margin-bottom: 30px;"></div>

                <!-- Product Details Section -->
                <div>
                    <h3 style="margin-bottom: 20px; font-size: 18px; font-weight: 600; color: white;">Product Details</h3>
                    
                    <div id="productList">
                        <!-- Initial Product Row -->
                        <div class="product-row" style="display: flex; gap: 16px; margin-bottom: 16px; align-items: center;">
                            <div style="flex: 2;">
                                <input type="text" class="serialNo" required placeholder="Serial No" style="margin-bottom: 0;">
                            </div>
                            <div style="flex: 1;">
                                <select class="size" required style="margin-bottom: 0;">
                                    <option value="M" selected>M</option>
                                    <option value="L">L</option>
                                    <option value="XL">XL</option>
                                    <option value="XXL">XXL</option>
                                </select>
                            </div>
                            <div style="flex: 1;">
                                <input type="number" class="pieces" required value="1" min="1" style="margin-bottom: 0;">
                            </div>
                            <div>
                                <button type="button" class="btn remove-product-btn" style="background: #ef4444; width: 44px; height: 44px; padding: 0; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: bold; border: none; flex-shrink: 0;">X</button>
                            </div>
                        </div>
                    </div>

                    <button type="button" id="addProductBtn" class="btn" style="width: auto; padding: 10px 20px; background: #6366f1; border: none; font-weight: 600; font-size: 14px; margin-top: 8px; border-radius: 8px;">+ Add Product</button>
                </div>

                <div style="height: 1px; background: rgba(255,255,255,0.1); margin: 30px 0;"></div>

                <!-- Additional Notes -->
                <div class="form-group">
                    <label>Additional Notes</label>
                    <textarea id="notes" placeholder="Enter any additional notes here..." style="min-height: 100px; resize: vertical;"></textarea>
                </div>

                <!-- Action Buttons -->
                <div style="margin-top: 30px; display: flex; justify-content: flex-end; gap: 16px;">
                    <button type="button" class="btn" id="printOrderBtn" style="width: auto; padding: 10px 30px; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); margin-top: 0;">
                        <span class="btn-text">Print</span>
                    </button>
                    <button type="submit" class="btn" id="saveOrderBtn" style="width: auto; padding: 10px 30px; margin-top: 0;">
                        <span class="btn-text">Save</span>
                        <span class="loader"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="./assets/js/order.js"></script>
</body>
</html>
