<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Order - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body class="dashboard-page">
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2" style="background: #10b981;"></div>

    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar glass-card">
            <div class="sidebar-header">
                <h2>Admin</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" data-tooltip="Dashboard">
                    <svg class="sidebar-link-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                    <span class="sidebar-label">Dashboard</span>
                </a>
                <a href="party.html" data-tooltip="Parties">
                    <svg class="sidebar-link-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    <span class="sidebar-label">Parties</span>
                </a>
                <a href="order.html" class="active" data-tooltip="Orders">
                    <svg class="sidebar-link-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span class="sidebar-label">Orders</span>
                </a>
                <a href="stock.html" data-tooltip="Stock Management">
                    <svg class="sidebar-link-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path
                            d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z">
                        </path>
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                        <line x1="12" y1="22.08" x2="12" y2="12"></line>
                    </svg>
                    <span class="sidebar-label">Stock Management</span>
                </a>
                <a href="user.html" data-tooltip="Users">
                    <svg class="sidebar-link-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <span class="sidebar-label">Users</span>
                </a>
                <a href="transport.html" data-tooltip="Transports">
                    <svg class="sidebar-link-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <rect x="1" y="3" width="15" height="13"></rect>
                        <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon>
                        <circle cx="5.5" cy="18.5" r="2.5"></circle>
                        <circle cx="18.5" cy="18.5" r="2.5"></circle>
                    </svg>
                    <span class="sidebar-label">Transports</span>
                </a>
                <a href="alerts.html" id="sidebarAlertNameLink" data-tooltip="Alert">
                    <svg class="sidebar-link-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                    <span class="sidebar-label">Alert</span>
                </a>
            </nav>
            <div style="margin-top: auto;">
                <button class="btn btn-logout" id="logoutBtn" data-tooltip="Log Out">
                    <svg class="sidebar-link-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    <span class="sidebar-label">Log Out</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Navbar -->
            <header class="top-navbar glass-card">
                <div class="navbar-title" style="font-size: 18px; font-weight: 600;">Order Management</div>
                <div class="navbar-user">
                    <button class="btn" id="addOrderBtn" style="width: auto; margin-top: 0; padding: 10px 20px;">
                        <span class="btn-text">+ Add Order</span>
                    </button>
                </div>
            </header>

            <!-- Search and Filter -->
            <div class="glass-card"
                style="max-width: none; padding: 20px; display: flex; gap: 16px; margin-bottom: 24px; align-items: center;">
                <input type="text" id="searchOrderInput"
                    placeholder="Search Order by Party, Transport, Mobile or Notes..." style="flex: 1;">


                <button class="btn" id="searchOrderBtn"
                    style="width: auto; margin-top: 0; padding: 0 24px; height: 50px;">
                    <span class="btn-text">Search</span>
                    <span class="loader"></span>
                </button>

                <button class="btn" id="resetFilterBtn"
                    style="width: auto; margin-top: 0; padding: 0 16px; height: 50px; background: rgba(255, 255, 255, 0.1); border: 1px solid var(--glass-border);"
                    title="Reset Filter">
                    <span class="btn-text">⟳</span>
                </button>
            </div>

            <!-- Table -->
            <div class="glass-card table-container" style="max-width: none; overflow-x: auto; padding: 0;">
                <table class="custom-table">
                    <thead>
                        <tr>
                            <th>Party Details</th>
                            <th>Order Date</th>
                            <th>Transport Details</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="orderTableBody">
                        <!-- Data populated by JS -->
                    </tbody>
                </table>
                <div id="paginationContainer" class="pagination-container">
                    <!-- Pagination populated by JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modal for Add/Edit -->
    <div id="orderModal" class="modal-overlay">
        <div class="glass-card modal-content" style="max-width: 900px; width: 100%; margin: 20px; padding: 30px;">
            <div
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 16px;">
                <h3 id="modalTitle" style="color: white; font-size: 20px; font-weight: 600;">Create New Order</h3>
                <button id="closeModal"
                    style="background: none; border: none; color: white; font-size: 28px; cursor: pointer; line-height: 1;">&times;</button>
            </div>

            <form id="orderForm">
                <input type="hidden" id="orderId">
                <!-- Step 1: Customer Details & Transport Info -->
                <div id="step1Container">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-bottom: 30px;">
                        <!-- Left Column: Customer Details -->
                        <div>
                            <div class="form-group">
                                <label>Party Name</label>
                                <div style="display: flex; gap: 12px; align-items: center;">
                                    <div class="searchable-select-wrapper" style="flex: 1;">
                                        <input type="text" id="partySearchInput"
                                            placeholder="Search Party by Name or Mobile..."
                                            style="margin-bottom: 0; padding-right: 40px;" autocomplete="off">
                                        <span class="select-arrow">▼</span>
                                        <select id="partyName" required style="display: none;">
                                            <option value="" disabled selected>Select Party</option>
                                            <!-- Options will be populated dynamically -->
                                        </select>
                                        <div id="partyDropdown" class="custom-dropdown"></div>
                                    </div>
                                    <button type="button" id="addPartyRedirectBtn" class="btn"
                                        style="width: auto; padding: 14px 24px; background: #6366f1; border: none; font-weight: 600; margin-top: 0; border-radius: 12px; height: 50px; display: flex; align-items: center; justify-content: center;">+
                                        Add</button>
                                </div>
                            </div>

                            <div class="row" style="display: flex; gap: 16px; margin-bottom: 20px;">
                                <div class="col form-group" style="flex: 1; margin-bottom: 0;">
                                    <label>State</label>
                                    <input type="text" id="state" required placeholder="State">
                                </div>
                                <div class="col form-group" style="flex: 1; margin-bottom: 0;">
                                    <label>City</label>
                                    <input type="text" id="city" required placeholder="City">
                                </div>
                            </div>
                            <div class="row" style="display: flex; gap: 16px; margin-bottom: 20px;">
                                <div class="col form-group" style="flex: 1; margin-bottom: 0;">
                                    <label>Pincode</label>
                                    <input type="text" id="pincode" required placeholder="Pincode">
                                </div>
                                <div class="col form-group" style="flex: 1; margin-bottom: 0;">
                                    <label>Address</label>
                                    <input type="text" id="address" required placeholder="Full Address">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Mobile Number</label>
                                <input type="text" id="mobile" required placeholder="Mobile Number">
                            </div>
                        </div>

                        <!-- Right Column: Transport & Payment -->
                        <div>
                            <div class="form-group" style="margin-bottom: 24px;">
                                <label>Order Date</label>
                                <input type="date" id="orderDate" required>
                            </div>

                            <h3 style="margin-bottom: 24px; font-size: 18px; font-weight: 600; color: white;">Transport
                                & Payment</h3>

                            <div class="form-group">
                                <label>Transport Name</label>
                                <select id="transportName" required>
                                    <option value="" disabled selected>Select Transport</option>
                                </select>
                            </div>



                            <div class="form-group">
                                <label>Payment Method</label>
                                <select id="paymentMethod" required>
                                    <option value="Cash" selected>Cash</option>
                                    <option value="UPI">UPI</option>
                                    <option value="Bank Transfer">Bank Transfer</option>
                                </select>
                            </div>

                        </div>
                    </div>

                    <div style="margin-top: 30px; display: flex; justify-content: flex-end;">
                        <button type="button" class="btn" id="nextStepBtn"
                            style="width: auto; padding: 12px 40px; margin-top: 0; background: #6366f1; border: none; font-weight: 600; border-radius: 12px; display: flex; align-items: center; justify-content: center; height: 50px;">
                            <span class="btn-text">Next</span>
                        </button>
                    </div>
                </div>

                <!-- Step 2: Product Details & Additional Notes -->
                <div id="step2Container" style="display: none;">
                    <!-- Product Details Section -->
                    <div>
                        <h3 style="margin-bottom: 20px; font-size: 18px; font-weight: 600; color: white;">Product
                            Details</h3>

                        <div id="productList">
                            <!-- Initial Product Row -->
                            <div class="product-row"
                                style="display: flex; gap: 16px; margin-bottom: 16px; align-items: center;">
                                <div style="flex: 2;">
                                    <select class="serialNo" required style="margin-bottom: 0;">
                                        <option value="" disabled selected>Select Product</option>
                                    </select>
                                </div>
                                <div style="flex: 1;">
                                    <select class="size" required style="margin-bottom: 0;">
                                        <option value="" disabled selected>Select Size</option>
                                        <option value="M">M</option>
                                        <option value="L">L</option>
                                        <option value="XL">XL</option>
                                        <option value="XXL">XXL</option>
                                    </select>
                                </div>
                                <div style="flex: 1;">
                                    <input type="number" class="pieces" required placeholder="Pieces Number" min="1"
                                        style="margin-bottom: 0;">
                                </div>
                                <div>
                                    <button type="button" class="btn remove-product-btn"
                                        style="background: #ef4444; width: 44px; height: 44px; padding: 0; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: bold; border: none; flex-shrink: 0;">X</button>
                                </div>
                            </div>
                        </div>

                        <button type="button" id="addProductBtn" class="btn"
                            style="width: auto; padding: 10px 20px; background: #6366f1; border: none; font-weight: 600; font-size: 14px; margin-top: 8px; border-radius: 8px;">+
                            Add Product</button>
                    </div>

                    <div style="height: 1px; background: rgba(255,255,255,0.1); margin: 30px 0;"></div>

                    <!-- Additional Notes -->
                    <div class="form-group">
                        <label>Additional Notes</label>
                        <textarea id="notes" placeholder="Enter any additional notes here..."
                            style="min-height: 100px; resize: vertical;"></textarea>
                    </div>

                    <!-- Action Buttons -->
                    <div style="margin-top: 30px; display: flex; justify-content: flex-end; gap: 16px;">
                        <button type="button" class="btn" id="prevStepBtn"
                            style="width: auto; padding: 10px 30px; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); margin-top: 0;">
                            <span class="btn-text">Back</span>
                        </button>
                        <button type="button" class="btn" id="printOrderBtn"
                            style="width: auto; padding: 10px 30px; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); margin-top: 0;">
                            <span class="btn-text">Print</span>
                        </button>
                        <button type="submit" class="btn" id="saveOrderBtn"
                            style="width: auto; padding: 10px 30px; margin-top: 0;">
                            <span class="btn-text">Save</span>
                            <span class="loader"></span>
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Hidden Print-Only Order Receipt Container -->
    <div id="printableOrderReceipt" class="print-only"></div>

    <script src="./assets/js/notifications.js"></script>
    <script src="./assets/js/order.js"></script>
</body>

</html>
