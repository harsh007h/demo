<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body class="dashboard-page">
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2" style="background: #10b981;"></div>
    
    <div class="dashboard-layout" id="dashboardContent" style="display: none;">
        <!-- Sidebar -->
        <aside class="sidebar glass-card">
            <div class="sidebar-header">
                <h2>Admin</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="active">Dashboard</a>
                <a href="party.html">Parties</a>
                <a href="order.html">Orders</a>
                <a href="stock.html">Stock Management</a>
            </nav>
            <div style="margin-top: auto;">
            <button class="btn btn-logout" id="logoutBtn">
                        Log Out
                    </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Navbar -->
            <header class="top-navbar glass-card">
                <div class="navbar-title" style="font-size: 18px; font-weight: 600;">Overview</div>
                <div class="navbar-user">
                    <div class="user-info-mini">
                        <div style="display: flex; flex-direction: column; text-align: right;">
                            <span id="userName" style="font-weight: 500;">Loading...</span>
                            <span id="userEmail" style="font-size: 11px; color: var(--text-secondary);"></span>
                        </div>
                        <div class="profile-avatar-mini" id="avatarInitial"></div>
                    </div>
                    
                </div>
            </header>

            <!-- Dashboard Cards -->
            <div class="dashboard-cards">
                <div class="card glass-card">
                    <h3>Total Orders</h3>
                    <div class="value" id="totalOrdersCount">Loading...</div>
                </div>
                <div class="card glass-card">
                    <h3>Pending Orders</h3>
                    <div class="value" id="pendingOrdersCount">Loading...</div>
                </div>
                <a href="stock.html" class="card glass-card" style="text-decoration: none; cursor: pointer; transition: all 0.3s ease;">
                    <h3>Stock Alert</h3>
                    <div class="value" id="lowStockCountVal" style="color: var(--error-color);">Loading...</div>
                </a>
            </div>
        </main>
    </div>

    <script src="./assets/js/dashboard.js"></script>
</body>
</html>
